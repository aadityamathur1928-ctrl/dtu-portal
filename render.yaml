services:
  - type: web
    name: regexamdtu
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn "app:create_app()" --bind 0.0.0.0:$PORT --workers 2 --timeout 60
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: regexamdtu-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.9

databases:
  - name: regexamdtu-db
    plan: free
