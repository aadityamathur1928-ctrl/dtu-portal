name: Keep Render warm

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /healthz
        run: |
          curl -sS --retry 3 --retry-delay 15 --max-time 60 \
            -o /dev/null -w "HTTP %{http_code} in %{time_total}s\n" \
            https://regexamdtu.co.in/healthz
